<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Nova Music Ingest</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        font-size: 13px;
        margin: 0;
        padding: 12px;
        width: 360px;
        background: #18181b;
        color: #e4e4e7;
      }
      h1 {
        font-size: 14px;
        margin: 0 0 10px;
      }
      label {
        display: block;
        font-weight: 600;
        color: #a1a1aa;
        margin-top: 8px;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        background: #27272a;
        border: 1px solid #3f3f46;
        color: #fafafa;
        padding: 6px 8px;
        border-radius: 4px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        margin-top: 4px;
      }
      button {
        margin-top: 12px;
        background: #10b981;
        color: white;
        border: 0;
        padding: 7px 14px;
        border-radius: 4px;
        font-weight: 600;
        cursor: pointer;
        font-size: 13px;
      }
      button:disabled {
        background: #52525b;
        cursor: not-allowed;
      }
      #status {
        margin-top: 12px;
        font-size: 11px;
        color: #a1a1aa;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        max-height: 180px;
        overflow-y: auto;
        background: #0a0a0a;
        border: 1px solid #27272a;
        padding: 8px;
        border-radius: 4px;
      }
      .err {
        color: #f87171;
      }
      .ok {
        color: #34d399;
      }
      small {
        display: block;
        color: #71717a;
        margin-top: 4px;
        font-size: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Nova Music Ingest</h1>
    <small>
      Pulls audio from YouTube via your browser (your IP, your cookies) and
      uploads it to Nova. The Nova SPA can also kick this off — this popup is
      a fallback for testing.
    </small>

    <label for="url">YouTube URL</label>
    <input id="url" type="text" placeholder="https://www.youtube.com/watch?v=…" />

    <label for="title">Title (optional)</label>
    <input id="title" type="text" />

    <label for="origin">Nova API origin</label>
    <input id="origin" type="text" placeholder="https://nova-video.vercel.app" />

    <button id="run">Ingest</button>

    <div id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
