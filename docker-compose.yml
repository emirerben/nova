version: '3.9'

services:
  web:
    build: ./src/apps/web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./src/apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

  api:
    build: ./src/apps/api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./src/apps/api:/app
    depends_on:
      - redis
      - db

  worker:
    build:
      context: ./src/apps/api
      dockerfile: Dockerfile.worker
    command: celery -A app.worker worker --loglevel=info --concurrency=2
    env_file: .env
    volumes:
      - ./src/apps/api:/app
    depends_on:
      - redis
      - db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nova
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
