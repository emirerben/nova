# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "nova-video"
primary_region = "iad"

# NOTE: kill_timeout is intentionally NOT set at the top level — Fly applies
# the top-level value to the release_command machine too, and as of 2026-05-09
# Fly caps stop_config.timeout at 5m server-side ("invalid stop_config.timeout,
# cannot exceed 5 minutes"). Setting it here at 30m breaks deploys.
# Instead, the 30m drain budget is set per-process in the [[vm]] sections
# below — api and worker both get 30m, the release_command machine uses
# Fly's default (which fits the new 5m cap).
# Why we want 30m for workers: orchestrate_template_job has an 1800s hard
# timeout, so 30m gives any almost-done FFmpeg run room to finish on deploy
# instead of being SIGKILL'd and leaving jobs orphaned in status=processing.

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "python -m alembic upgrade head"

# ---------------------------------------------------------------------------
# Process groups
# ---------------------------------------------------------------------------

[processes]
  api = "uvicorn app.main:app --host 0.0.0.0 --port 8000"
  # concurrency=1: shared-CPU workers shouldn't multiplex video encode tasks.
  # With concurrency=2 each task fights another for the 2 shared CPUs, so a
  # 14s local curtain-close encode ballooned to >600s in prod (job d018d1c3
  # post-PR #103). One task per worker means each task gets the full CPU
  # allocation. Trade-off: half the parallel throughput, but each render
  # completes in roughly a quarter of the wall-clock.
  worker = "celery -A app.worker worker --loglevel=info --concurrency=1"

# ---------------------------------------------------------------------------
# HTTP service (api process only)
# ---------------------------------------------------------------------------

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["api"]
  auto_stop_machines = true
  auto_start_machines = true

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = 15000        # ms
    grace_period = "10s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = 5000          # ms

# ---------------------------------------------------------------------------
# Worker — always running, no HTTP exposure
# ---------------------------------------------------------------------------

[[services]]
  processes = ["worker"]
  auto_stop_machines = false
  auto_start_machines = true

# ---------------------------------------------------------------------------
# VM sizing per process group
# ---------------------------------------------------------------------------

[[vm]]
  processes = ["api"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
  kill_timeout = "30m"

[[vm]]
  processes = ["worker"]
  cpu_kind = "shared"
  cpus = 2
  # 4096MB instead of 2048: the font-identification pipeline (PR2) holds an
  # open-clip ViT-B/32 image-tower singleton resident (~150MB weights + ~250MB
  # torch CPU runtime + activations). Combined with concurrent FFmpeg
  # subprocesses at 1080×1920 (peak working set 800MB-1.4GB) the 2048MB
  # ceiling leaves 0-800MB of headroom. OOM mid-render orphans jobs at
  # status=processing rather than failing cleanly. Revisit once
  # process_resident_set_size telemetry confirms whether the bump was needed.
  memory_mb = 4096
  kill_timeout = "30m"
