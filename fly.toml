# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "nova-video"
primary_region = "iad"

# NOTE: kill_timeout is intentionally NOT set at the top level — Fly applies
# the top-level value to the release_command machine too, and as of 2026-05-09
# Fly caps stop_config.timeout at 5m server-side ("invalid stop_config.timeout,
# cannot exceed 5 minutes"). Setting it here at 30m breaks deploys.
# Instead, the 30m drain budget is set per-process in the [[vm]] sections
# below — api and worker both get 30m, the release_command machine uses
# Fly's default (which fits the new 5m cap).
# Why we want 30m for workers: orchestrate_template_job has an 1800s hard
# timeout, so 30m gives any almost-done FFmpeg run room to finish on deploy
# instead of being SIGKILL'd and leaving jobs orphaned in status=processing.

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "python -m alembic upgrade head"

# ---------------------------------------------------------------------------
# Process groups
# ---------------------------------------------------------------------------

[processes]
  api = "uvicorn app.main:app --host 0.0.0.0 --port 8000"
  # concurrency=1: shared-CPU workers shouldn't multiplex video encode tasks.
  # With concurrency=2 each task fights another for the 2 shared CPUs, so a
  # 14s local curtain-close encode ballooned to >600s in prod (job d018d1c3
  # post-PR #103). One task per worker means each task gets the full CPU
  # allocation. Trade-off: half the parallel throughput, but each render
  # completes in roughly a quarter of the wall-clock.
  worker = "celery -A app.worker worker --loglevel=info --concurrency=1"
  # Celery Beat — single instance, drives the every-5-min stale-job
  # sweeper (app/tasks/maintenance.py) that catches orphans created when
  # autoretry budgets are exhausted AND _mark_failed itself failed.
  # MUST remain a single process group with one machine — Beat doesn't
  # de-duplicate across replicas. See [[vm]] below for the small VM.
  beat = "celery -A app.worker beat --loglevel=info"

# ---------------------------------------------------------------------------
# HTTP service (api process only)
# ---------------------------------------------------------------------------

[[services]]
  protocol = "tcp"
  internal_port = 8000
  processes = ["api"]
  # auto_stop_machines + min_machines_running = 1 prevents the proxy's
  # autostopper from racing rolling deploys. With a single api replica and
  # no floor, the proxy autostops the machine ~10s after flyctl takes its
  # lease — leaving a "stopped with new image" machine that nothing
  # restarts until the orchestrator's 5m poll times out and red-marks an
  # otherwise-successful deploy. Canonical trace:
  # https://github.com/emirerben/nova/actions/runs/26036712549 (PR #217).
  # Floor of 1 makes autostop a no-op for current single-replica prod and
  # still trims to 1 if we ever add a second api machine.
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = 15000        # ms
    grace_period = "10s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = 5000          # ms

# ---------------------------------------------------------------------------
# Worker — always running, no HTTP exposure
# ---------------------------------------------------------------------------

[[services]]
  processes = ["worker"]
  auto_stop_machines = false
  auto_start_machines = true

# ---------------------------------------------------------------------------
# VM sizing per process group
# ---------------------------------------------------------------------------

[[vm]]
  processes = ["api"]
  cpu_kind = "shared"
  cpus = 1
  # 2026-05-18: 512 → 2048. Kernel OOM-killed uvicorn during a 4-concurrent
  # clip_prefetch burst (template 7b4a98d5…, batch-9774726a9e3d). Log:
  #   "Out of memory: Killed process 636 (uvicorn) total-vm:900984kB"
  # The Semaphore(4) in app/services/clip_prefetch.py was sized against
  # the 512MB budget but didn't account for /tmp being tmpfs on Firecracker
  # — each in-flight clip's tempfile.TemporaryDirectory() counts against
  # RAM. 2048MB covers the observed ~900MB peak with ~1.1GB headroom so
  # larger clip batches (longer/higher-bitrate footage, future workloads)
  # don't push us back into OOM territory. If we ever see OOMs at 2048
  # the structural fix is moving clip_prefetch off the api process onto
  # the worker pool (which has 6144MB).
  memory_mb = 2048
  kill_timeout = "30m"

# Beat — tiny VM, schedules periodic tasks (no real CPU/memory needs).
# Keep at 1 machine; Beat schedule de-duplication across replicas is not
# trivial and we don't need it for a single 5-min sweeper.
[[vm]]
  processes = ["beat"]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[[vm]]
  processes = ["worker"]
  cpu_kind = "shared"
  # cpus=4 (not 2): Fly hard-caps shared-cpu-2x at memory_mb=4096. The first
  # attempt to bump to 6144 (v0.4.24.1, PR #185) was accepted by the schema
  # but rejected at deploy time with "invalid config.guest.memory_mb, cannot
  # exceed 4096 MiB" — workers stayed on the old image. Moving to
  # shared-cpu-4x unlocks the 6144 memory ceiling. The extra 2 vCPUs are
  # incidental (concurrency=1 means a worker still runs one task at a time),
  # but ffmpeg will use them for parallel filter/encode threads.
  cpus = 4
  # 4096MB instead of 2048: the font-identification pipeline (PR2) holds an
  # open-clip ViT-B/32 image-tower singleton resident (~150MB weights + ~250MB
  # torch CPU runtime + activations). Combined with concurrent FFmpeg
  # subprocesses at 1080×1920 (peak working set 800MB-1.4GB) the 2048MB
  # ceiling leaves 0-800MB of headroom. OOM mid-render orphans jobs at
  # status=processing rather than failing cleanly.
  #
  # 2026-05-17: bumped 4096 → 6144 after admin-test job
  # 022a00e4-7926-4d82-b248-16431dec543b OOM-killed at FFmpeg anon-rss 1897MB
  # / total-vm 3596MB on a MINIMAL single-pass spec (inputs=1 transitions=0
  # abs_pngs=0 abs_ass=2). Kernel log: "Out of memory: Killed process 892
  # (ffmpeg)". The small input count rules out the many-decoders failure
  # mode — single-pass.py's dual-output [base]+[vout] split at line 555
  # holds float-pipeline frames for two simultaneous libx264 encoders, and
  # the reframe chain's format=gbrpf32le step is a 6.4× memory expansion
  # (reframe.py:438). 6144 gives ~2.2GB FFmpeg headroom above the observed
  # working set; if this recurs the structural fix is dropping
  # base_output_path on the preview_mode path.
  memory_mb = 6144
  kill_timeout = "30m"
  # SIGTERM (not Fly's SIGINT default) is Celery's clean warm-shutdown signal:
  # the worker stops consuming new tasks and lets the in-flight task finish
  # before exiting. Paired with the 30m kill_timeout above, a deploy then gives
  # a long render (e.g. a multi-clip generative job) a chance to complete and
  # persist rather than being cut off mid-variant. This is best-effort drain;
  # the hard guarantee against deploy/OOM kills is the resumable-variant logic
  # in orchestrate_generative_job (each variant is persisted as it finishes and
  # reused on the acks_late retry) plus the reaper (#326) clearing any row a
  # SIGKILL still strands.
  kill_signal = "SIGTERM"
