name: Docker Build Check

# Verifies the production Dockerfile actually builds with the current
# .dockerignore. Catches Dockerfile/.dockerignore coupling bugs on the PR
# instead of at deploy-to-Fly time.
#
# Incident motivating this check (May 2026):
#   - PR #118 (v0.4.7.0, merged at f156c19) added
#     `COPY src/apps/api/tests/evals/rubrics ./tests/evals/rubrics`
#     to the prod Dockerfile.
#   - Local pytest + the existing test-api CI job both passed because they
#     run against the Python source tree directly — they never build the
#     Docker image.
#   - The merge-to-main deploy then failed on Fly's builder because
#     `.dockerignore` excludes `tests/` entirely, so the COPY source did
#     not exist in the build context.
#   - PR #119 (121a6e9) hotfixed `.dockerignore` with negation patterns.
#
# Approach: Option A — local `docker buildx` against the prod Dockerfile.
# We picked this over Option B (`fly deploy --build-only --remote-only`)
# because (1) it doesn't need FLY_API_TOKEN exposed to PR runs from forks,
# (2) it doesn't burn Fly build minutes on every PR, and (3) BuildKit's
# layer cache via GHA cache backend makes warm runs ~30-60s. The build
# context (.dockerignore-filtered repo root) is identical to what Fly's
# builder sees, so any COPY/.dockerignore mismatch surfaces here.

on:
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "src/apps/api/**"

# Cancel superseded runs on the same PR.
concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Build prod image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build prod image (validates Dockerfile + .dockerignore)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: nova-build-test:ci
          cache-from: type=gha,scope=docker-build-check
          cache-to: type=gha,scope=docker-build-check,mode=max

      # Runtime smoke check — text-behind-subject added mediapipe as a prod
      # dep. mediapipe pulls in opencv-contrib-python as a transitive dep,
      # which ships the same top-level `cv2` module name as
      # opencv-python-headless (already installed for other pipeline code) —
      # a version conflict between the two resolves fine at `pip install`
      # but can explode at first `import cv2` inside the actual built image.
      # Proves the three imports resolve together in the image, not just the
      # dev venv (local pytest never builds the Docker image).
      - name: Smoke-check cv2/skia/mediapipe import at runtime
        run: |
          docker run --rm --entrypoint python nova-build-test:ci -c \
            'import cv2, skia, mediapipe; print("cv2/skia/mediapipe import OK")'

      # Import success is NOT enough for mediapipe: ImageSegmenter CREATION
      # needs libGLESv2 at runtime. When libgles2 was missing from the image
      # (July 2026), imports passed, local pytest passed (macOS ships its own
      # GL), and every prod matte failed silently — text-behind-subject
      # rendered as plain pasted-on-top text because the matte engine is
      # best-effort by design. Creating a real IMAGE-mode segmenter from the
      # bundled model and running one inference catches that class on the PR.
      - name: Smoke-check mediapipe ImageSegmenter runs at runtime
        run: |
          docker run --rm --entrypoint python nova-build-test:ci -c '
          import numpy as np
          import mediapipe as mp
          from mediapipe.tasks import python as mp_python
          from mediapipe.tasks.python import vision as mp_vision

          opts = mp_vision.ImageSegmenterOptions(
              base_options=mp_python.BaseOptions(
                  model_asset_path="assets/models/selfie_segmenter.tflite"),
              running_mode=mp_vision.RunningMode.IMAGE,
              output_confidence_masks=True,
          )
          seg = mp_vision.ImageSegmenter.create_from_options(opts)
          frame = np.zeros((64, 64, 3), dtype=np.uint8)
          image = mp.Image(image_format=mp.ImageFormat.SRGB, data=frame)
          result = seg.segment(image)
          assert result.confidence_masks, "segmenter returned no masks"
          seg.close()
          print("ImageSegmenter smoke check passed")
          '

      # Runtime smoke check — catches version-mismatch bugs that pass
      # `pip install` but explode at first import. Motivating incident
      # (May 2026): PR #150 (v0.4.15.0) pinned torch CPU but not
      # torchvision; pip pulled a CUDA-built torchvision from the default
      # index, and the very first open_clip call at worker boot raised
      # `RuntimeError('operator torchvision::nms does not exist')` because
      # the C++ op never registered against CPU-only torch. The image
      # built fine; the failure only surfaced at deploy. Load the registry
      # artifact, then build ViT-B/32 without pretrained weights and run a
      # real encode_image pass. That still forces torch/torchvision/open-clip
      # to wire up, but keeps PR CI deterministic instead of depending on a
      # cold Hugging Face download from inside the container.
      - name: Smoke-check CLIP font matcher loads at runtime
        run: |
          docker run --rm \
            -e STORAGE_BUCKET=ci-noop \
            -e STORAGE_PROVIDER=gcs \
            -e DATABASE_URL=postgresql://ci:ci@127.0.0.1/ci \
            -e REDIS_URL=redis://127.0.0.1:6379 \
            -e OPENAI_API_KEY=sk-ci-noop \
            -e GEMINI_API_KEY=ci-noop \
            -e TOKEN_ENCRYPTION_KEY=ci-noop \
            -e ALLOWED_ORIGINS='["http://localhost:3000"]' \
            --entrypoint python nova-build-test:ci -c '
          import io
          import open_clip
          import torch
          from PIL import Image
          from app.pipeline.font_identification import load_registry_embeddings
          from app.services.clip_font_matcher import (
              MODEL_ARCHITECTURE,
              MODEL_ID,
              MODEL_VERSION,
          )

          registry = load_registry_embeddings(
              expected_model_id=MODEL_ID,
              expected_model_version=MODEL_VERSION,
          )
          assert len(registry.families) > 0, "registry embeddings are empty"
          model, _train_pre, preprocess = open_clip.create_model_and_transforms(
              MODEL_ARCHITECTURE,
              pretrained=None,
              load_weights=False,
              pretrained_image=False,
              pretrained_text=False,
              device="cpu",
          )
          model.eval()

          # Run a real embedding to exercise the visual tower + preprocess
          # pipeline (which is where torchvision ops live).
          buf = io.BytesIO()
          Image.new("RGB", (8, 8), color=(128, 128, 128)).save(buf, format="PNG")
          tensor = preprocess(Image.open(io.BytesIO(buf.getvalue())).convert("RGB")).unsqueeze(0)
          with torch.no_grad():
              emb = model.encode_image(tensor)
          assert emb.shape[-1] == 512, f"unexpected embedding shape {emb.shape}"
          print("CLIP smoke check passed: embedding shape", emb.shape)
          '
