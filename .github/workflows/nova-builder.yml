name: Nova Builder

# Autonomous-dev-loop builder cron (M4). Fires every ~45 min during the
# founder's day-job window (work hours only) and runs ONE timeout-bounded
# builder tick: claim the oldest queued build_task via the admin API, run
# Claude Code headless on it in a worktree, WIP-commit + checkpoint, then
# soft-exit. The *schedule is the auto-resume mechanism* — there is NO waiting
# logic. A run that hits a Claude usage limit / 429 soft-exits (exit 0) and the
# next scheduled tick continues the same task from its checkpoint.
#
# Auth: anthropics/claude-code-action via a 1-year CLAUDE_CODE_OAUTH_TOKEN repo
# secret (claude setup-token) — runs on the founder's Pro/Max subscription, no
# metered Claude bill. Admin API access via ADMIN_PROD_API_KEY repo secret.
#
# Cost guard: work-hours-only + the self-imposed task/day cap lives in the
# build_task queue itself (a quiet tick when the queue is empty is healthy).
#
# Manual dry-run: `gh workflow run nova-builder.yml` (workflow_dispatch).

on:
  schedule:
    # UTC. The founder works ~7am-7pm; build only in the morning/early-afternoon
    # window (7am-2pm ET ≈ 11:00-18:00 UTC) so it leaves evening subscription
    # headroom for the founder's own coding (shared bucket — no programmatic
    # sub-budget). ~Every 45 min: minutes 0 and 45 of hours 11-18 UTC.
    - cron: "0,45 11-18 * * 1-5"
  workflow_dispatch: {}

# Never let two ticks run at once — a second concurrent claim is already
# prevented by SKIP LOCKED at the DB layer, but cancelling the overlap also
# avoids two runners pushing the same WIP branch.
concurrency:
  group: nova-builder
  cancel-in-progress: true

permissions:
  contents: write       # WIP-commit + push the builder branch
  pull-requests: write  # open the evening-review PR

jobs:
  build-tick:
    runs-on: ubuntu-latest
    # Hard ceiling far under the 6h Actions cap; the per-run Claude wall-clock
    # cap (NOVA_BUILDER_TIMEOUT_S=900s) is stricter and lives in the runner so
    # a timed-out chunk still gets WIP-committed + released, not hard-killed.
    timeout-minutes: 20
    steps:
      - name: Checkout (full history for branching)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git identity
        run: |
          git config user.name  "nova-builder[bot]"
          git config user.email "nova-builder@users.noreply.github.com"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run one builder tick
        env:
          # Pro/Max subscription token — flat cost, no metered Claude bill.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Admin API token for claim/checkpoint/complete (Fly prod).
          ADMIN_PROD_API_KEY: ${{ secrets.ADMIN_PROD_API_KEY }}
          # Opaque run identity stamped into build_task.claimed_by.
          NOVA_BUILDER_RUN_ID: "gha-${{ github.run_id }}-${{ github.run_attempt }}"
          # Per-run Claude wall-clock cap (seconds). Stricter than timeout-minutes.
          NOVA_BUILDER_TIMEOUT_S: "900"
        run: bash scripts/cron/build_task_runner.sh
