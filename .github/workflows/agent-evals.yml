name: Agent evals

# Two triggers:
#   - `pull_request` (paths-filtered): runs the structural-only suite on every
#     PR that touches prompt files, agent code, or the eval harness itself.
#     No secrets needed; ~30s. This is the prompt-regression guardrail.
#   - `workflow_dispatch` (manual): runs live + judge evals against Gemini and
#     the Claude-Sonnet judge. Costs real money, needs both API keys, ramp via
#     `--allow-cost`.
on:
  workflow_dispatch:
    inputs:
      agent:
        description: "Which agent to eval (all / Big-3 / Phase-2 in-pipeline)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - template_recipe
          - clip_metadata
          - creative_direction
          - transcript
          - platform_copy
          - audio_template
      with_judge:
        description: "Run Claude-Sonnet judge"
        required: false
        default: true
        type: boolean

  pull_request:
    branches: [main, dev]
    paths:
      - "src/apps/api/prompts/**"
      - "src/apps/api/app/agents/**"
      - "src/apps/api/tests/evals/**"
      - "src/apps/api/tests/fixtures/agent_evals/**"
      - ".github/workflows/agent-evals.yml"

jobs:
  structural:
    name: Structural evals (PR guardrail)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        working-directory: src/apps/api
        run: pip install -e ".[dev]"

      - name: Run structural evals
        working-directory: src/apps/api
        # Default mode: replay + structural-only. No API keys needed.
        # Fork PRs can run this — `secrets.*` are not referenced.
        run: pytest tests/evals/ -v

  eval:
    name: Live evals (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        working-directory: src/apps/api
        run: pip install -e ".[dev]"

      - name: Pick test target
        id: target
        run: |
          case "${{ inputs.agent }}" in
            template_recipe)
              echo "path=tests/evals/test_template_recipe_evals.py" >> "$GITHUB_OUTPUT" ;;
            clip_metadata)
              echo "path=tests/evals/test_clip_metadata_evals.py" >> "$GITHUB_OUTPUT" ;;
            creative_direction)
              echo "path=tests/evals/test_creative_direction_evals.py" >> "$GITHUB_OUTPUT" ;;
            transcript)
              echo "path=tests/evals/test_transcript_evals.py" >> "$GITHUB_OUTPUT" ;;
            platform_copy)
              echo "path=tests/evals/test_platform_copy_evals.py" >> "$GITHUB_OUTPUT" ;;
            audio_template)
              echo "path=tests/evals/test_audio_template_evals.py" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "path=tests/evals/" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Pick judge flag
        id: judge
        run: |
          if [ "${{ inputs.with_judge }}" = "true" ]; then
            echo "flag=--with-judge" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run live agent evals
        working-directory: src/apps/api
        env:
          NOVA_EVAL_MODE: live
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pytest ${{ steps.target.outputs.path }} -v ${{ steps.judge.outputs.flag }} --eval-mode=live --allow-cost
