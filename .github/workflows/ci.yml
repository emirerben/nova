name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - name: Install web dependencies
        working-directory: src/apps/web
        run: pnpm install --no-frozen-lockfile
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install API dependencies
        working-directory: src/apps/api
        run: pip install -e ".[dev]"
      - name: Run lint
        run: make lint

  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nova_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install API dependencies
        working-directory: src/apps/api
        run: pip install -e ".[dev]"
      - name: Run API tests
        working-directory: src/apps/api
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nova_test
          REDIS_URL: redis://localhost:6379
          STORAGE_BUCKET: nova-test
          STORAGE_PROVIDER: gcs
          OPENAI_API_KEY: sk-test
          WHISPER_BACKEND: local
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY_TEST }}
        run: pytest tests/ -v --ignore=tests/quality
